<html lang="en">
<head>

<title>Post Frame Estimator — Ebbers Construction</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Instrument+Serif:ital@0;1&display=swap');
:root{--white:#fff;--off-white:#f7f7f5;--light-gray:#eae9e6;--mid-gray:#b8b8b4;--dark-gray:#555;--near-black:#1a1a1a;--black:#0d0d0d;--accent:#c8a44e;--accent-light:#dfc475;--accent-dark:#a8853a;--error:#b8332a;--shadow-sm:0 1px 3px rgba(0,0,0,.06);--shadow-md:0 4px 16px rgba(0,0,0,.08);--shadow-lg:0 8px 32px rgba(0,0,0,.12);--r:8px;--rlg:14px;--tr:.25s cubic-bezier(.19,1,.22,1);--fb:'DM Sans',sans-serif;--fd:'Instrument Serif',serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{font-family:var(--fb);color:var(--near-black);background:var(--off-white);line-height:1.6;min-height:100vh;-webkit-font-smoothing:antialiased}
.site-header{background:var(--black);color:#fff;padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:68px;position:sticky;top:0;z-index:100;border-bottom:2px solid var(--accent)}
.logo-area{display:flex;align-items:center;gap:14px}
.logo-area img{height:44px;width:auto;filter:brightness(0) invert(1)}
.logo-text{font-family:var(--fd);font-size:1.4rem;color:#fff}
.logo-text span{color:var(--accent)}
.header-contact{font-size:.85rem;color:var(--mid-gray);display:flex;align-items:center;gap:6px}
.header-contact a{color:var(--accent-light);text-decoration:none}
.app-container{display:flex;min-height:calc(100vh - 68px)}
.sidebar{width:230px;background:var(--white);border-right:1px solid var(--light-gray);padding:16px 0;flex-shrink:0;position:sticky;top:68px;height:calc(100vh - 68px);overflow-y:auto;z-index:50}
.sidebar-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.12em;color:var(--mid-gray);padding:14px 20px 6px;font-weight:600}
.nav-btn{display:flex;align-items:center;gap:10px;width:100%;padding:11px 20px;border:none;background:none;font-family:var(--fb);font-size:.95rem;color:var(--dark-gray);cursor:pointer;transition:all var(--tr);text-align:left;position:relative}
.nav-btn::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:3px;background:var(--accent);border-radius:0 3px 3px 0;opacity:0;transition:opacity var(--tr)}
.nav-btn:hover{background:var(--off-white);color:var(--near-black)}
.nav-btn.active{color:var(--near-black);font-weight:600;background:var(--off-white)}
.nav-btn.active::before{opacity:1}
.nav-icon{width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:1.1rem}
.main-content{flex:1;padding:36px 48px 80px;max-width:1100px}
.panel{display:none;animation:fadeUp .35s ease-out}
.panel.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.panel-header{margin-bottom:28px}
.panel-header h2{font-family:var(--fd);font-size:2.2rem;font-weight:400;color:var(--near-black);line-height:1.2}
.panel-header p{color:var(--dark-gray);font-size:1rem;margin-top:4px}
.section-card{background:var(--white);border:1px solid var(--light-gray);border-radius:var(--rlg);padding:28px;margin-bottom:22px;box-shadow:var(--shadow-sm)}
.section-card h3{font-size:1.05rem;font-weight:600;color:var(--near-black);margin-bottom:18px;display:flex;align-items:center;gap:8px}
.section-card h3 .badge{font-size:.7rem;background:var(--accent);color:#fff;padding:2px 10px;border-radius:20px;font-weight:500;text-transform:uppercase;letter-spacing:.05em}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.form-grid.cols-3{grid-template-columns:1fr 1fr 1fr}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group label{font-size:.85rem;font-weight:500;color:var(--dark-gray)}
.form-group label .unit{font-weight:400;color:var(--mid-gray)}
input[type="number"],input[type="text"],select{font-family:var(--fb);font-size:1rem;padding:11px 14px;border:1px solid var(--light-gray);border-radius:var(--r);background:var(--white);color:var(--near-black);transition:border-color var(--tr),box-shadow var(--tr);width:100%;outline:none}
input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(200,164,78,.15)}
input[disabled]{background:var(--off-white);color:var(--dark-gray)}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--light-gray)}
.toggle-row:last-child{border-bottom:none}
.toggle-row>label{font-size:.95rem;color:var(--near-black);cursor:pointer;flex:1}
.toggle-switch{position:relative;width:48px;height:26px;flex-shrink:0;cursor:pointer}
.toggle-switch input{position:absolute;opacity:0;width:100%;height:100%;cursor:pointer;z-index:2;margin:0}
.toggle-slider{position:absolute;inset:0;background:var(--light-gray);border-radius:26px;transition:background var(--tr);pointer-events:none}
.toggle-slider::before{content:'';position:absolute;height:20px;width:20px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:transform var(--tr);box-shadow:0 1px 3px rgba(0,0,0,.15)}
.toggle-switch input:checked+.toggle-slider{background:var(--accent)}
.toggle-switch input:checked+.toggle-slider::before{transform:translateX(22px)}
.color-grid{display:flex;flex-wrap:wrap;gap:7px}
.color-swatch{width:40px;height:40px;border-radius:var(--r);border:2px solid transparent;cursor:pointer;transition:all var(--tr);position:relative}
.color-swatch:hover{transform:scale(1.15);z-index:2}
.color-swatch.selected{border-color:var(--near-black);box-shadow:0 0 0 2px #fff,0 0 0 4px var(--near-black);transform:scale(1.1)}
.color-swatch[title]::after{content:attr(title);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--near-black);color:#fff;font-size:.75rem;padding:4px 10px;border-radius:4px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .2s;z-index:10}
.color-swatch:hover::after{opacity:1}
.selected-color-label{font-size:.88rem;color:var(--dark-gray);margin-top:8px;font-style:italic}
.preview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.preview-card{border:2px solid var(--light-gray);border-radius:var(--rlg);padding:14px;cursor:pointer;transition:all var(--tr);text-align:center;background:var(--white)}
.preview-card:hover{border-color:var(--mid-gray);box-shadow:var(--shadow-md)}
.preview-card.selected{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-light)}
.preview-card .preview-img{width:100%;height:110px;display:flex;align-items:center;justify-content:center;margin-bottom:8px;overflow:hidden;border-radius:var(--r);background:var(--off-white)}
.preview-card .preview-name{font-size:.9rem;font-weight:600;color:var(--near-black)}
.preview-card .preview-desc{font-size:.78rem;color:var(--dark-gray);margin-top:2px}
.item-list{display:flex;flex-direction:column;gap:10px}
.item-row{display:flex;align-items:center;gap:12px;padding:14px 18px;background:var(--off-white);border-radius:var(--r);border:1px solid var(--light-gray);flex-wrap:wrap}
.item-row select,.item-row input{flex:1;min-width:100px}
.btn-remove{background:none;border:none;color:var(--error);cursor:pointer;font-size:1.2rem;padding:4px;line-height:1;opacity:.6;transition:opacity var(--tr)}
.btn-remove:hover{opacity:1}
.btn-add{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border:1px dashed var(--mid-gray);border-radius:var(--r);background:none;font-family:var(--fb);font-size:.92rem;color:var(--dark-gray);cursor:pointer;transition:all var(--tr);margin-top:10px}
.btn-add:hover{border-color:var(--accent);color:var(--accent-dark);background:rgba(200,164,78,.05)}
.building-preview-wrapper{background:var(--white);border:1px solid var(--light-gray);border-radius:var(--rlg);padding:24px;margin-bottom:22px;box-shadow:var(--shadow-sm)}
.building-canvas{width:100%;max-height:500px;display:block;margin:0 auto}
.preview-tabs{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap}
.preview-tab{padding:8px 16px;border:1px solid var(--light-gray);border-radius:var(--r);background:none;font-family:var(--fb);font-size:.88rem;color:var(--dark-gray);cursor:pointer;transition:all var(--tr)}
.preview-tab:hover{background:var(--off-white)}
.preview-tab.active{background:var(--near-black);color:#fff;border-color:var(--near-black)}
.estimate-section{margin-bottom:24px}
.estimate-section h4{font-size:.92rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--accent-dark);padding-bottom:8px;border-bottom:2px solid var(--accent);margin-bottom:0}
.estimate-table{width:100%;border-collapse:collapse;font-size:.92rem}
.estimate-table th{text-align:left;padding:10px 12px;font-size:.78rem;text-transform:uppercase;letter-spacing:.06em;color:var(--dark-gray);border-bottom:1px solid var(--light-gray);font-weight:600}
.estimate-table td{padding:10px 12px;border-bottom:1px solid var(--light-gray);color:var(--near-black)}
.estimate-table tr:last-child td{border-bottom:none}
.estimate-table .text-right{text-align:right}
.estimate-table .section-total td{font-weight:600;background:var(--off-white);border-top:2px solid var(--light-gray)}
.grand-total{background:var(--near-black);color:#fff;padding:24px 28px;border-radius:var(--rlg);margin-top:24px;display:flex;justify-content:space-between;align-items:center}
.grand-total .total-label{font-size:1.15rem;font-weight:500}
.grand-total .total-amount{font-family:var(--fd);font-size:2.2rem}
.cost-sqft{font-size:.92rem;color:var(--mid-gray);margin-top:4px}
.btn-primary{display:inline-flex;align-items:center;gap:8px;padding:13px 26px;background:var(--near-black);color:#fff;border:none;border-radius:var(--r);font-family:var(--fb);font-size:1rem;font-weight:500;cursor:pointer;transition:all var(--tr)}
.btn-primary:hover{background:var(--accent-dark)}
.btn-secondary{display:inline-flex;align-items:center;gap:8px;padding:13px 26px;background:var(--white);color:var(--near-black);border:1px solid var(--light-gray);border-radius:var(--r);font-family:var(--fb);font-size:1rem;font-weight:500;cursor:pointer;transition:all var(--tr)}
.btn-secondary:hover{border-color:var(--mid-gray);box-shadow:var(--shadow-sm)}
.btn-group{display:flex;gap:10px;margin-top:22px;flex-wrap:wrap}
.price-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.price-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--off-white);border-radius:var(--r);border:1px solid var(--light-gray)}
.price-item .price-label{font-size:.9rem;color:var(--near-black)}
.price-item input{width:100px;text-align:right;font-size:.92rem;padding:8px 10px}
.spec-locked{display:inline-flex;align-items:center;gap:4px;font-size:.78rem;color:var(--accent-dark);background:rgba(200,164,78,.1);padding:3px 10px;border-radius:4px;font-weight:500}
.info-card{background:var(--white);border:1px solid var(--light-gray);border-radius:var(--rlg);padding:28px;margin-bottom:22px;display:flex;gap:24px;align-items:flex-start}
.info-card .info-illustration{width:160px;height:140px;flex-shrink:0;background:var(--off-white);border-radius:var(--r);display:flex;align-items:center;justify-content:center;overflow:hidden}
.info-card .info-body h4{font-size:1.1rem;font-weight:600;margin-bottom:6px}
.info-card .info-body p{font-size:.95rem;color:var(--dark-gray);line-height:1.6;margin-bottom:8px}
.info-card .info-body ul{margin:0;padding-left:20px;font-size:.92rem;color:var(--dark-gray);line-height:1.7}
.client-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.site-footer{background:var(--near-black);color:var(--mid-gray);padding:22px 28px;font-size:.85rem;text-align:center;border-top:2px solid var(--accent)}
.site-footer a{color:var(--accent-light);text-decoration:none}
.mobile-menu-btn{display:none;align-items:center;justify-content:center;width:42px;height:42px;border:1px solid rgba(255,255,255,.2);border-radius:var(--r);background:none;color:#fff;font-size:1.5rem;cursor:pointer;flex-shrink:0}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:150}
.overlay.open{display:block}
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--light-gray);z-index:200;overflow-x:auto;-webkit-overflow-scrolling:touch;box-shadow:0 -2px 10px rgba(0,0,0,.08)}
.mobile-nav-inner{display:flex;min-width:max-content;padding:4px 8px}
.mobile-nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 12px;border:none;background:none;font-family:var(--fb);font-size:.68rem;color:var(--dark-gray);cursor:pointer;white-space:nowrap;flex-shrink:0}
.mobile-nav-btn .mnav-icon{font-size:1.2rem;line-height:1}
.mobile-nav-btn.active{color:var(--accent-dark);font-weight:600}
@media(max-width:768px){
.sidebar{display:none;position:fixed;top:68px;left:0;width:260px;height:calc(100vh - 68px);background:var(--white);box-shadow:var(--shadow-lg);z-index:200}
.sidebar.open{display:block}
.mobile-menu-btn{display:flex!important}
.mobile-nav{display:block}
.main-content{padding:24px 18px 90px;max-width:100%}
.form-grid,.client-info-grid{grid-template-columns:1fr}
.form-grid.cols-3{grid-template-columns:1fr 1fr}
.preview-grid{grid-template-columns:1fr 1fr}
.price-grid{grid-template-columns:1fr}
.grand-total{flex-direction:column;text-align:center;gap:8px}
.header-contact{display:none}
.info-card{flex-direction:column}
.info-card .info-illustration{width:100%;height:120px}
.site-footer{padding-bottom:75px}
}
.header-total{display:flex;flex-direction:column;align-items:flex-end;position:relative;min-width:120px}
.header-total .total-num{font-family:var(--fd);font-size:1.5rem;color:var(--accent-light);line-height:1.1;transition:transform .15s ease}
.header-total .total-num.bump{transform:scale(1.12)}
.header-total .total-label-sm{font-size:.65rem;color:var(--mid-gray);text-transform:uppercase;letter-spacing:.08em}
.cost-float{position:absolute;right:0;font-family:var(--fb);font-size:.88rem;font-weight:600;pointer-events:none;opacity:0;white-space:nowrap;z-index:101}
.cost-float.positive{color:#5ebd72}
.cost-float.negative{color:#e86060}
.cost-float.animate{animation:floatUp .9s ease-out forwards}
@keyframes floatUp{
0%{opacity:1;transform:translateY(0)}
60%{opacity:1;transform:translateY(-28px)}
100%{opacity:0;transform:translateY(-42px)}
}
@media(max-width:768px){
.header-total .total-num{font-size:1.15rem}
}
@media print{
.sidebar,.site-header,.site-footer,.btn-primary,.btn-secondary,.btn-add,.btn-remove,.mobile-menu-btn,.mobile-nav{display:none!important}
.main-content{padding:0;max-width:100%}
.panel{display:block!important}
.section-card{break-inside:avoid;box-shadow:none;border:1px solid #ddd}
}
</style>
</head>

function initNavigation(){

  function switchPanel(t){
    sBtns.forEach(b=>{b.classList.toggle('active',b.dataset.panel===t)});

    panels.forEach(p=>{p.classList.toggle('active',p.id==='panel-'+t)});
    el('sidebar').classList.remove('open');el('overlay').classList.remove('open');

// ═══════════════════════════════════════
// BUILDING PREVIEW (4 elevations + plan)
// ═══════════════════════════════════════
function renderBuildingPreview(){
  const svg=el('buildingSVG');if(!svg)return;
  const W=val('bldWidth'),L=val('bldLength'),eave=val('eaveHeight'),pitch=val('roofPitch');
  const roofStyle=sel('roofStyle'),wainHt=val('wainscotHt'),postSp=val('postSpSide');
  const rc=getHex(selectedColors.roof),wc=getHex(selectedColors.sidewall),wnc=getHex(selectedColors.wainscot),tc=getHex(selectedColors.trim);
  const hasPorch=chk('porchToggle'),porchWall=sel('porchWall'),porchDepth=val('porchDepth'),porchLen=val('porchLength');
  const cW=900,cH=550,pad=70;let s='';
  s+=`<rect width="${cW}" height="${cH}" fill="#fafaf8"/>`;
  const groundY=cH-pad;
  s+=`<line x1="${pad}" y1="${groundY}" x2="${cW-pad}" y2="${groundY}" stroke="#999" stroke-width="1" stroke-dasharray="6,3"/>`;

  if(previewView==='plan'){
    renderPlanView(s,svg,W,L,postSp,eave,pitch,roofStyle,tc,rc,wc,hasPorch,porchWall,porchDepth,porchLen,cW,cH);return;
  }

  // Determine wall dimensions for this view
  let wallW,wallLabel,wallDirLabel;
  const isEndwall=(previewView==='front'||previewView==='back');
  wallW=isEndwall?W:L;
  wallDirLabel=previewView.charAt(0).toUpperCase()+previewView.slice(1);
  const roofRise=(W/2)*(pitch/12);
  const totalH=eave+(isEndwall&&roofStyle==='gable'?roofRise:0);
  const scale=Math.min((cW-pad*2)/(wallW*1.3),(cH-pad*2)/(totalH*1.2));
  const bldW=wallW*scale,bldH=eave*scale;
  const x0=(cW-bldW)/2,y0=groundY-bldH;

  if(showFraming){
    // FRAMING VIEW
    // Posts
    const numPosts=Math.floor(wallW/postSp)+1;
    for(let i=0;i<numPosts;i++){
      const px=x0+i*(bldW/(numPosts-1));
      s+=`<rect x="${px-3}" y="${y0}" width="6" height="${bldH}" fill="#c4a060" stroke="#8b6b3d" stroke-width="1"/>`;
    }
    // Girts
    const girtRows=Math.floor(eave*12/24);
    for(let g=1;g<=girtRows;g++){
      const gy=groundY-g*2*scale;
      s+=`<line x1="${x0}" y1="${gy}" x2="${x0+bldW}" y2="${gy}" stroke="#d4b87a" stroke-width="2"/>`;
    }
    // Grade board
    s+=`<rect x="${x0}" y="${groundY-1*scale}" width="${bldW}" height="${1*scale}" fill="none" stroke="#5a8040" stroke-width="2" stroke-dasharray="8,3"/>`;
    // Roof framing
    if(isEndwall&&roofStyle==='gable'){
      const peakX=x0+bldW/2,peakY=y0-roofRise*scale;
      s+=`<line x1="${x0}" y1="${y0}" x2="${peakX}" y2="${peakY}" stroke="#8b6b3d" stroke-width="2.5"/>`;
      s+=`<line x1="${peakX}" y1="${peakY}" x2="${x0+bldW}" y2="${y0}" stroke="#8b6b3d" stroke-width="2.5"/>`;
    }else{
      s+=`<line x1="${x0}" y1="${y0}" x2="${x0+bldW}" y2="${y0}" stroke="#8b6b3d" stroke-width="2.5"/>`;
    }
  }else{
    // SIDING VIEW
    // Main wall
    s+=`<rect x="${x0}" y="${y0}" width="${bldW}" height="${bldH}" fill="${wc}" stroke="${tc}" stroke-width="2"/>`;
    // Ribs on wall (pro-rib look)
    if(sel('panelProfile')==='pro-rib'){
      const ribSpPx=9/12*scale*3;// 9" ribs scaled
      for(let rx=x0+ribSpPx;rx<x0+bldW;rx+=ribSpPx){
        s+=`<line x1="${rx}" y1="${y0}" x2="${rx}" y2="${groundY}" stroke="${tc}" stroke-width=".3" opacity=".15"/>`;
      }
    }
    // Wainscot
    if(wainHt>0){
      const wH=wainHt*scale;
      s+=`<rect x="${x0}" y="${groundY-wH}" width="${bldW}" height="${wH}" fill="${wnc}" stroke="${tc}" stroke-width="1.5"/>`;
      // Wainscot center board
      s+=`<line x1="${x0}" y1="${groundY-wH/2}" x2="${x0+bldW}" y2="${groundY-wH/2}" stroke="${tc}" stroke-width="1" opacity=".4"/>`;
    }
    // Gable wall + fascia (endwalls only)
    if(isEndwall&&roofStyle==='gable'){
      const peakX=x0+bldW/2,peakY=y0-roofRise*scale;
      // Gable wall area (same color as sidewall)
      s+=`<polygon points="${x0},${y0} ${peakX},${peakY} ${x0+bldW},${y0}" fill="${wc}" stroke="${tc}" stroke-width="2"/>`;
      // Fascia/eave line (just the edge — NOT a filled roof triangle)
      const oh=8;
      s+=`<line x1="${x0-oh}" y1="${y0}" x2="${x0+bldW+oh}" y2="${y0}" stroke="${tc}" stroke-width="3"/>`;
      // Ridge point trim
      s+=`<circle cx="${peakX}" cy="${peakY}" r="3" fill="${tc}"/>`;
    }else if(!isEndwall){
      // Side view — show roof slope
      const roofThick=4;
      if(roofStyle==='gable'){
        s+=`<rect x="${x0-8}" y="${y0-roofThick}" width="${bldW+16}" height="${roofThick}" fill="${rc}" stroke="${tc}" stroke-width="1.5"/>`;
      }
      // Fascia
      s+=`<line x1="${x0-8}" y1="${y0}" x2="${x0+bldW+8}" y2="${y0}" stroke="${tc}" stroke-width="2.5"/>`;
    }
    // Corner trim
    s+=`<line x1="${x0}" y1="${y0}" x2="${x0}" y2="${groundY}" stroke="${tc}" stroke-width="3"/>`;
    s+=`<line x1="${x0+bldW}" y1="${y0}" x2="${x0+bldW}" y2="${groundY}" stroke="${tc}" stroke-width="3"/>`;
    // Base trim
    s+=`<line x1="${x0}" y1="${groundY}" x2="${x0+bldW}" y2="${groundY}" stroke="${tc}" stroke-width="2.5"/>`;
  }

  // Doors on this wall
  ohDoors.filter(d=>d.wall===previewView).forEach((d,i)=>{
    const dims=d.size.split('x').map(Number);
    const dW=dims[0]*scale,dH=dims[1]*scale;
    const dx=x0+(d.pos/100)*(bldW-dW);
    const dy=groundY-dH;
    // Door posts (2 flanking)
    s+=`<rect x="${dx-4}" y="${y0}" width="6" height="${bldH}" fill="${tc}" opacity=".6"/>`;
    s+=`<rect x="${dx+dW-2}" y="${y0}" width="6" height="${bldH}" fill="${tc}" opacity=".6"/>`;
    // Door
    s+=`<rect x="${dx}" y="${dy}" width="${dW}" height="${dH}" fill="#ddd" stroke="${tc}" stroke-width="1.5" rx="1"/>`;
    for(let j=1;j<4;j++)s+=`<line x1="${dx}" y1="${dy+j*dH/4}" x2="${dx+dW}" y2="${dy+j*dH/4}" stroke="#bbb" stroke-width=".5"/>`;
    // Size label
    s+=`<text x="${dx+dW/2}" y="${dy-6}" text-anchor="middle" font-size="11" fill="#666" font-family="DM Sans,sans-serif">${d.size.replace('x',"'×")}'</text>`;
  });

  walkDoors.filter(d=>d.wall===previewView).forEach((d,i)=>{
    const dW=3*scale,dH=7*scale;
    const dx=x0+(d.pos/100)*(bldW-dW);
    const dy=groundY-dH;
    s+=`<rect x="${dx}" y="${dy}" width="${dW}" height="${dH}" fill="${getHex(selectedColors.walkDoor)}" stroke="${tc}" stroke-width="1.5" rx="1"/>`;
    s+=`<rect x="${dx+dW*.6}" y="${dy+dH*.45}" width="${dW*.08}" height="${dW*.08}" fill="${tc}" rx="1"/>`;
  });

  windows.filter(w=>w.wall===previewView).forEach((w,i)=>{
    const dims=w.size.split('x').map(Number);
    const wW=dims[0]*scale,wH=dims[1]*scale;
    const wx=x0+(w.pos/100)*(bldW-wW);
    const wy=y0+bldH*0.3;
    s+=`<rect x="${wx}" y="${wy}" width="${wW}" height="${wH}" fill="#b8d4e8" stroke="${tc}" stroke-width="1.5" rx="1"/>`;
    s+=`<line x1="${wx+wW/2}" y1="${wy}" x2="${wx+wW/2}" y2="${wy+wH}" stroke="${tc}" stroke-width="1"/>`;
    s+=`<line x1="${wx}" y1="${wy+wH/2}" x2="${wx+wW}" y2="${wy+wH/2}" stroke="${tc}" stroke-width="1"/>`;
  });

  // Porch
  if(hasPorch&&porchWall===previewView){
    const pD=porchDepth*scale,pL=Math.min(porchLen,wallW)*scale;
    const px0=x0+(bldW-pL)/2;
    s+=`<rect x="${px0}" y="${y0}" width="${pL}" height="${2}" fill="${rc}" opacity=".5"/>`;
    // Porch posts
    const pPosts=Math.ceil(porchLen/8)+1;
    for(let p=0;p<pPosts;p++){
      const ppx=px0+p*(pL/(pPosts-1));
      s+=`<rect x="${ppx-4}" y="${y0}" width="8" height="${bldH}" fill="#8b6b3d" stroke="#5a4020" stroke-width="1" opacity=".7"/>`;
    }
    // Porch roof line
    s+=`<line x1="${px0-10}" y1="${y0-5}" x2="${px0+pL+10}" y2="${y0-5}" stroke="${tc}" stroke-width="2"/>`;
    s+=`<text x="${px0+pL/2}" y="${y0-12}" text-anchor="middle" font-size="11" fill="#888" font-family="DM Sans,sans-serif">Porch — ${porchDepth}' deep</text>`;
  }

  // Person silhouette for scale (6ft)
  const personH=6*scale;
  const personX=x0+bldW+20;
  s+=`<ellipse cx="${personX}" cy="${groundY-personH}" rx="${3}" ry="${4}" fill="#ccc"/>`;
  s+=`<line x1="${personX}" y1="${groundY-personH+4}" x2="${personX}" y2="${groundY-personH*.3}" stroke="#ccc" stroke-width="2"/>`;
  s+=`<line x1="${personX-6}" y1="${groundY-personH*.6}" x2="${personX+6}" y2="${groundY-personH*.6}" stroke="#ccc" stroke-width="1.5"/>`;
  s+=`<line x1="${personX}" y1="${groundY-personH*.3}" x2="${personX-5}" y2="${groundY}" stroke="#ccc" stroke-width="1.5"/>`;
  s+=`<line x1="${personX}" y1="${groundY-personH*.3}" x2="${personX+5}" y2="${groundY}" stroke="#ccc" stroke-width="1.5"/>`;
  s+=`<text x="${personX}" y="${groundY+14}" text-anchor="middle" font-size="10" fill="#aaa" font-family="DM Sans,sans-serif">6'</text>`;

  // Dimensions
  s+=`<text x="${cW/2}" y="${groundY+28}" text-anchor="middle" font-size="14" fill="#666" font-family="DM Sans,sans-serif">${wallW}' ${isEndwall?'Wide':'Long'}</text>`;
  s+=`<text x="${x0-20}" y="${y0+bldH/2}" text-anchor="middle" font-size="13" fill="#666" font-family="DM Sans,sans-serif" transform="rotate(-90 ${x0-20} ${y0+bldH/2})">${eave}' Eave</text>`;
  s+=`<text x="${cW/2}" y="${30}" text-anchor="middle" font-size="16" fill="#333" font-weight="600" font-family="DM Sans,sans-serif">${wallDirLabel} Elevation${showFraming?' — Framing':''} — ${pitch}:12</text>`;

  svg.innerHTML=s;
}

function renderPlanView(s,svg,W,L,postSp,eave,pitch,roofStyle,tc,rc,wc,hasPorch,porchWall,porchDepth,porchLen,cW,cH){
  const pad=70;
  const scale=Math.min((cW-pad*2)/(W*1.3),(cH-pad*2)/(L*1.3));
  const bldW=W*scale,bldH=L*scale;
  const x0=(cW-bldW)/2,y0=(cH-bldH)/2;
  s+=`<rect x="${x0}" y="${y0}" width="${bldW}" height="${bldH}" fill="${sel('floorType')==='concrete'?'#d8d8d0':'#e8dcc8'}" stroke="${tc}" stroke-width="2"/>`;

  // Sidewall posts
  const numSide=Math.floor(L/postSp)+1;
  for(let i=0;i<numSide;i++){
    const py=y0+i*(bldH/(numSide-1));
    s+=`<rect x="${x0-5}" y="${py-5}" width="10" height="10" fill="#8b6b3d" stroke="#5a4020" stroke-width="1" rx="1"/>`;
    s+=`<rect x="${x0+bldW-5}" y="${py-5}" width="10" height="10" fill="#8b6b3d" stroke="#5a4020" stroke-width="1" rx="1"/>`;
  }
  // Endwall posts
  const ewPostSp=W/Math.max(2,Math.ceil(W/postSp));
  const numEnd=Math.floor(W/ewPostSp)+1;
  for(let i=1;i<numEnd-1;i++){
    const px=x0+i*(bldW/(numEnd-1));
    s+=`<rect x="${px-5}" y="${y0-5}" width="10" height="10" fill="#8b6b3d" stroke="#5a4020" stroke-width="1" rx="1"/>`;
    s+=`<rect x="${px-5}" y="${y0+bldH-5}" width="10" height="10" fill="#8b6b3d" stroke="#5a4020" stroke-width="1" rx="1"/>`;
  }

  // Ridge
  if(roofStyle==='gable')s+=`<line x1="${x0+bldW/2}" y1="${y0-5}" x2="${x0+bldW/2}" y2="${y0+bldH+5}" stroke="${rc}" stroke-width="2" stroke-dasharray="8,4"/>`;

  // Porch
  if(hasPorch){
    const pL=Math.min(porchLen,porchWall==='front'||porchWall==='back'?W:L)*scale;
    const pD=porchDepth*scale;
    let px,py,pw,ph;
    if(porchWall==='front'){px=x0+(bldW-pL)/2;py=y0-pD;pw=pL;ph=pD}
    else if(porchWall==='back'){px=x0+(bldW-pL)/2;py=y0+bldH;pw=pL;ph=pD}
    else if(porchWall==='left'){px=x0-pD;py=y0+(bldH-pL)/2;pw=pD;ph=pL}
    else{px=x0+bldW;py=y0+(bldH-pL)/2;pw=pD;ph=pL}
    s+=`<rect x="${px}" y="${py}" width="${pw}" height="${ph}" fill="rgba(139,107,61,.15)" stroke="#8b6b3d" stroke-width="1.5" stroke-dasharray="6,3" rx="2"/>`;
    s+=`<text x="${px+pw/2}" y="${py+ph/2+4}" text-anchor="middle" font-size="11" fill="#8b6b3d" font-family="DM Sans,sans-serif">Porch</text>`;
  }

  s+=`<text x="${cW/2}" y="${y0-20}" text-anchor="middle" font-size="14" fill="#666" font-family="DM Sans,sans-serif">${W}' × ${L}'</text>`;
  s+=`<text x="${cW/2}" y="${30}" text-anchor="middle" font-size="16" fill="#333" font-weight="600" font-family="DM Sans,sans-serif">Overhead Plan View</text>`;
  // Compass
  s+=`<text x="${cW-pad+15}" y="${y0+20}" font-size="13" fill="#aaa" font-family="DM Sans,sans-serif">N ↑</text>`;
  // Wall labels
  s+=`<text x="${x0+bldW/2}" y="${y0-5}" text-anchor="middle" font-size="11" fill="#999" font-family="DM Sans,sans-serif">Front</text>`;
  s+=`<text x="${x0+bldW/2}" y="${y0+bldH+15}" text-anchor="middle" font-size="11" fill="#999" font-family="DM Sans,sans-serif">Back</text>`;
  s+=`<text x="${x0-10}" y="${y0+bldH/2+4}" text-anchor="end" font-size="11" fill="#999" font-family="DM Sans,sans-serif">Left</text>`;
  s+=`<text x="${x0+bldW+10}" y="${y0+bldH/2+4}" text-anchor="start" font-size="11" fill="#999" font-family="DM Sans,sans-serif">Right</text>`;

  svg.innerHTML=s;
}

// MATERIAL LIST (no pricing)

function generateMaterialList(){
  const data=computeEstimateData();
  let html='';
  data.sections.forEach(sec=>{
    html+=`<div class="estimate-section"><h4>${sec.title}</h4><table class="estimate-table"><thead><tr><th>Item</th><th>Qty</th><th>Unit</th></tr></thead><tbody>`;
    sec.lines.forEach(l=>{html+=`<tr><td>${l.desc}</td><td>${l.qty}</td><td>${l.unit}</td></tr>`});
    html+=`</tbody></table></div>`;
  });
  html+=`<div style="text-align:center;margin-top:20px;padding:16px;border-top:1px solid #eee;font-size:.88rem;color:#888">Ebbers Construction · 402-580-5977 · Material list generated ${new Date().toLocaleDateString()}</div>`;
  el('materialListOutput').innerHTML=html;
}

// ═══════════════════════════════════════
// ESTIMATE CALCULATOR
// ═══════════════════════════════════════
function computeEstimateData(){
  const W=val('bldWidth'),L=val('bldLength'),eave=val('eaveHeight'),pitch=val('roofPitch');
  const roofStyle=sel('roofStyle'),postSp=val('postSpSide'),trussSp=val('trussSp');
  const wainHt=val('wainscotHt'),wainMat=sel('wainscotMat'),panelProfile=sel('panelProfile');
  const perim=2*(W+L),floorSF=W*L;
  const slopeLen=Math.sqrt(Math.pow(W/2,2)+Math.pow((W/2)*(pitch/12),2));
  const roofSF=roofStyle==='gable'?2*slopeLen*L:slopeLen*L;
  const wallSF=perim*eave;

  const numPostsSide=Math.floor(L/postSp)+1;
  const numPostsEnd=Math.max(3,Math.floor(W/postSp)+1);
  // Add 2 posts per OH door
  const extraDoorPosts=ohDoors.length*2;
  const totalPosts=(numPostsSide*2)+(numPostsEnd*2)-4+extraDoorPosts;
  const postLenFt=eave+1;
  const postSize=sel('postSize');
  let postPlies=3,postKey='2x6_lf';
  if(postSize==='3ply-2x8'){postKey='2x8_lf'}
  if(postSize==='4ply-2x6'){postPlies=4}
  if(postSize==='6x6'){postPlies=1;postKey='6x6_timber_lf'}
  const postLF=totalPosts*postLenFt*(postSize==='6x6'?1:postPlies);
  const footingDia=val('footingDia'),footingDepth=val('footingDepth');
  const footVolEa=Math.PI*Math.pow(footingDia/24,2)*(footingDepth/36);
  const footYards=totalPosts*footVolEa;
  const bracketKey=sel('bracketType')==='wet-set'?'bracket_wetset':'bracket_retrofit';
  const sonoKey=footingDia<=16?'sonotube_16':footingDia<=18?'sonotube_18':'sonotube_24';

  const numTrusses=Math.floor(L/trussSp)+1;
  const girtRows=Math.floor(eave*12/24);
  const girtLF=girtRows*perim;
  const gradeBoardLF=perim;
  const numPurlinRows=Math.floor(slopeLen*12/24);
  const purlinSides=roofStyle==='gable'?2:1;
  const purlinLF=numPurlinRows*L*purlinSides;
  const fasciaLF=roofStyle==='gable'?L*2:L*2+W;
  const ssdScrews=numPurlinRows*purlinSides*numTrusses*2;
  const wainBoardLF=wainHt>0?perim:0;
  const panelKey=panelProfile==='board-batten'?'board_batten_lf':panelProfile==='standing-seam'?'standing_seam_lf':'pro_rib_lf';
  const wallPanelSF=wallSF-(wainHt*perim);
  const wallPanelLF=wallPanelSF/3;
  const roofPanelLF=roofSF/3;
  let wainCost=0,wainLabel='';
  const wainSF=wainHt*perim;
  if(wainMat==='steel'||wainMat==='board-batten'){const wk=wainMat==='board-batten'?'board_batten_lf':'pro_rib_lf';wainCost=(wainSF/3)*PRICES[wk];wainLabel=wainMat==='board-batten'?'B&B Wainscot':'Pro-Rib Wainscot'}
  else if(wainMat==='versetta-stone'){wainCost=wainSF*PRICES.versetta_stone_sqft;wainLabel='Versetta Stone Wainscot'}
  const trimLF=perim*3+(W*2)+(L*2);
  const ridgeCapLF=L;
  const wallInsul=sel('wallInsul'),roofInsul=sel('roofInsul');
  const insulMap={bubble:'bubble_wrap_sqft',r19:'r19_batt_sqft',r30:'r30_batt_sqft','spray-closed':'spray_closed_sqft','spray-open':'spray_open_sqft'};
  const insulNames={bubble:'Bubble Wrap',r19:'R-19 Fiberglass',r30:'R-30 Fiberglass','spray-closed':'Spray Foam Closed','spray-open':'Spray Foam Open'};
  const houseWrapCost=chk('houseWrap')?wallSF*PRICES.house_wrap_sqft:0;
  const wallLinerCost=chk('wallLiner')?wallSF*PRICES.liner_panel_sqft:0;
  const ceilingLinerCost=chk('ceilingLiner')?floorSF*PRICES.liner_panel_sqft:0;
  const xBraceSets=chk('dblXBrace')?Math.ceil(numPostsSide/2)*2:0;
  const ridgeVentCost=chk('ridgeVent')?L*PRICES.ridge_vent_lf:0;
  const eaveVentCount=chk('eaveVent')?Math.ceil(L/8)*2:0;
  const gutterLF=chk('gutters')?L*2:0;
  let dsCount=0;if(chk('gutters'))dsCount=sel('downspouts')==='auto'?Math.ceil(L*2/40):parseInt(sel('downspouts'));
  let lvlLF=0;ohDoors.forEach(d=>{const dims=d.size.split('x').map(Number);lvlLF+=dims[0]+2});
  let doorLines=[];
  ohDoors.forEach(d=>{const k='oh_door_'+d.size;const c=PRICES[k]||1000;const oc=d.opener?PRICES.oh_opener:0;doorLines.push({desc:`OH Door ${d.size.replace('x',"'×")}' — ${d.style}${d.opener?' + opener':''}`,qty:1,unit:'ea',cost:c+oc})});
  walkDoors.forEach(d=>{const k='walk_door_'+d.size;doorLines.push({desc:`Walk Door ${d.size}`,qty:1,unit:'ea',cost:PRICES[k]||450})});
  windows.forEach(w=>{const k='window_'+w.size;doorLines.push({desc:`Window ${w.size.replace('x',"'×")}'`,qty:1,unit:'ea',cost:PRICES[k]||200})});
  const flashTapeRolls=Math.ceil(windows.length/4);
  let concreteLines=[];
  if(sel('floorType')==='concrete'){
    const st=val('slabThick'),sy=floorSF*(st/12)/27;
    concreteLines.push({desc:`Concrete Slab ${st}" — ${floorSF} SF`,qty:Math.ceil(sy*10)/10,unit:'yd³',cost:sy*PRICES.concrete_yard});
    const rb=sel('rebarType');
    if(rb==='4-rebar'){const bars=Math.ceil(Math.ceil(floorSF/16)*2/2);concreteLines.push({desc:'#4 Rebar Grid',qty:bars,unit:'bars',cost:bars*PRICES.rebar_4_20ft})}
    else if(rb==='wwm'){const r=Math.ceil(floorSF/750);concreteLines.push({desc:'Welded Wire Mesh',qty:r,unit:'rolls',cost:r*PRICES.wwm_roll})}
    else if(rb==='fiber'){const b=Math.ceil(sy*1.5);concreteLines.push({desc:'Fiber Mesh',qty:b,unit:'bags',cost:b*PRICES.fiber_mesh_bag})}
    if(chk('vaporBarrier')){const r=Math.ceil(floorSF/1500);concreteLines.push({desc:'Vapor Barrier 6mil',qty:r,unit:'rolls',cost:r*PRICES.vapor_barrier_roll})}
  }
  let porchLines=[];
  if(chk('porchToggle')){
    const pLen=val('porchLength'),pPS=sel('porchPostSize'),pF=val('porchFooting')||16;
    const pPosts=Math.ceil(pLen/8)+1;
    const pPK=pPS==='8x8'?'porch_post_8x8_ea':'porch_post_6x6_ea';
    porchLines.push({desc:`Porch Posts (${pPS})`,qty:pPosts,unit:'ea',cost:pPosts*PRICES[pPK]});
    porchLines.push({desc:`Porch Footings`,qty:pPosts,unit:'ea',cost:pPosts*PRICES[pF<=16?'sonotube_16':'sonotube_18']});
  }
  const elecCost=chk('elecRoughIn')?PRICES.electrical_roughin:0;

  const sections=[];
  sections.push({title:'Foundation & Footings',lines:[
    {desc:`Concrete Footings (${footingDia}" × ${footingDepth}")`,qty:Math.ceil(footYards*10)/10,unit:'yd³',cost:footYards*PRICES.concrete_yard},
    {desc:`Sonotube ${footingDia}"`,qty:totalPosts,unit:'ea',cost:totalPosts*PRICES[sonoKey]},
    {desc:sel('bracketType')==='wet-set'?'Wet-Set Brackets w/ Rebar':'Retrofit Brackets',qty:totalPosts,unit:'ea',cost:totalPosts*PRICES[bracketKey]}
  ]});
  const framingLines=[
    {desc:`Posts — ${postSize.replace(/-/g,' ')} × ${postLenFt}'`,qty:totalPosts,unit:'ea',cost:postLF*PRICES[postKey]},
    {desc:`Trusses — ${W}' span @ ${trussSp}' o.c.`,qty:numTrusses,unit:'ea',cost:numTrusses*W*PRICES.truss_lf_span},
    {desc:'2×6 Wall Girts @ 24" o.c.',qty:Math.ceil(girtLF),unit:'LF',cost:girtLF*PRICES['2x6_lf']},
    {desc:'2×4 Purlins @ 24" o.c.',qty:Math.ceil(purlinLF),unit:'LF',cost:purlinLF*PRICES['2x4_lf']},
    {desc:'2×12 Treated Grade Board',qty:Math.ceil(gradeBoardLF),unit:'LF',cost:gradeBoardLF*PRICES['2x12_treated_lf']},
    {desc:'2×6 Fascia Board',qty:Math.ceil(fasciaLF),unit:'LF',cost:fasciaLF*PRICES.fascia_2x6_lf},
    {desc:'6" SSD Screws',qty:ssdScrews,unit:'ea',cost:ssdScrews*PRICES.ssd_screw_6in},
    {desc:'LVL Headers (OH Doors)',qty:Math.ceil(lvlLF),unit:'LF',cost:lvlLF*PRICES.lvl_header_lf}
  ];
  if(wainBoardLF>0)framingLines.push({desc:'2×6 Center Wainscot Board',qty:Math.ceil(wainBoardLF),unit:'LF',cost:wainBoardLF*PRICES['2x6_lf']});
  if(xBraceSets>0)framingLines.push({desc:'Double X Brace Sets',qty:xBraceSets,unit:'sets',cost:xBraceSets*PRICES.x_brace_set});
  sections.push({title:'Framing',lines:framingLines});

  const steelLines=[
    {desc:`Wall Panels — ${panelProfile}`,qty:Math.ceil(wallPanelLF),unit:'LF',cost:wallPanelLF*PRICES[panelKey]},
    {desc:`Roof Panels — ${panelProfile}`,qty:Math.ceil(roofPanelLF),unit:'LF',cost:roofPanelLF*PRICES[panelKey]}
  ];
  if(wainCost>0)steelLines.push({desc:wainLabel,qty:Math.ceil(wainSF),unit:'SF',cost:wainCost});
  steelLines.push({desc:'Trim & Flashing',qty:Math.ceil(trimLF),unit:'LF',cost:trimLF*PRICES.trim_lf});
  steelLines.push({desc:'Ridge Cap',qty:Math.ceil(ridgeCapLF),unit:'LF',cost:ridgeCapLF*PRICES.ridge_cap_lf});
  sections.push({title:'Steel & Exterior',lines:steelLines});

  const insulLines=[];
  if(houseWrapCost>0)insulLines.push({desc:'Block-it House Wrap',qty:Math.ceil(wallSF),unit:'SF',cost:houseWrapCost});
  if(wallInsul!=='none')insulLines.push({desc:`Wall — ${insulNames[wallInsul]||''}`,qty:Math.ceil(wallSF),unit:'SF',cost:wallSF*(PRICES[insulMap[wallInsul]]||0)});
  if(roofInsul!=='none')insulLines.push({desc:`Roof — ${insulNames[roofInsul]||''}`,qty:Math.ceil(roofSF),unit:'SF',cost:roofSF*(PRICES[insulMap[roofInsul]]||0)});
  if(wallLinerCost>0)insulLines.push({desc:'Wall Liner Panels',qty:Math.ceil(wallSF),unit:'SF',cost:wallLinerCost});
  if(ceilingLinerCost>0)insulLines.push({desc:'Ceiling Liner Panels',qty:Math.ceil(floorSF),unit:'SF',cost:ceilingLinerCost});
  if(insulLines.length)sections.push({title:'Insulation & Liner',lines:insulLines});

  const ventLines=[];
  if(ridgeVentCost>0)ventLines.push({desc:'Ridge Vent',qty:Math.ceil(L),unit:'LF',cost:ridgeVentCost});
  if(eaveVentCount>0)ventLines.push({desc:'Eave Vents',qty:eaveVentCount,unit:'ea',cost:eaveVentCount*PRICES.eave_vent_ea});
  if(gutterLF>0)ventLines.push({desc:'6" Seamless Gutters',qty:Math.ceil(gutterLF),unit:'LF',cost:gutterLF*PRICES.gutter_6in_lf});
  if(dsCount>0)ventLines.push({desc:'Downspouts',qty:dsCount,unit:'ea',cost:dsCount*PRICES.downspout_ea});
  if(ventLines.length)sections.push({title:'Ventilation & Gutters',lines:ventLines});

  if(doorLines.length){
    if(flashTapeRolls>0)doorLines.push({desc:'Flashing Tape',qty:flashTapeRolls,unit:'rolls',cost:flashTapeRolls*PRICES.flashing_tape_roll});
    sections.push({title:'Doors & Windows',lines:doorLines});
  }
  if(concreteLines.length)sections.push({title:'Concrete Floor',lines:concreteLines});
  if(porchLines.length)sections.push({title:'Timber Porch',lines:porchLines});
  if(elecCost>0)sections.push({title:'Electrical',lines:[{desc:'Electrical Rough-In',qty:1,unit:'lot',cost:elecCost}]});

  let materialTotal=0;
  sections.forEach(sec=>{sec.subtotal=0;sec.lines.forEach(l=>{sec.subtotal+=l.cost});materialTotal+=sec.subtotal});
  const wastePct=val('wastePct')/100,laborPct=val('laborPct')/100,gcPct=val('gcPct')/100;
  const wasteAmt=materialTotal*wastePct,matWaste=materialTotal+wasteAmt;
  const laborAmt=matWaste*laborPct,subtotal=matWaste+laborAmt;
  const gcAmt=subtotal*gcPct,grandTotal=subtotal+gcAmt;
  return{sections,materialTotal,wasteAmt,matWaste,laborAmt,gcAmt,grandTotal,floorSF,W,L,eave:val('eaveHeight'),pitch:val('roofPitch'),roofStyle:sel('roofStyle'),panelProfile:sel('panelProfile'),totalPosts,wastePct,laborPct,gcPct};
}

  let html=`<div class="section-card" style="margin-bottom:20px"><h3>Building Summary</h3>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;font-size:.95rem">

  d.sections.forEach(sec=>{
    html+=`<div class="estimate-section"><h4>${sec.title}</h4><table class="estimate-table"><thead><tr><th>Item</th><th>Qty</th><th>Unit</th><th class="text-right">Cost</th></tr></thead><tbody>`;
    sec.lines.forEach(l=>{html+=`<tr><td>${l.desc}</td><td>${l.qty}</td><td>${l.unit}</td><td class="text-right">${fmt(l.cost)}</td></tr>`});
    html+=`<tr class="section-total"><td colspan="3">${sec.title} Subtotal</td><td class="text-right">${fmt(sec.subtotal)}</td></tr></tbody></table></div>`;
  });

  html+=`<div class="estimate-section"><h4>Totals</h4><table class="estimate-table"><tbody>
  <tr><td>Material Subtotal</td><td></td><td></td><td class="text-right">${fmt(d.materialTotal)}</td></tr>
  <tr><td>Waste (${(d.wastePct*100).toFixed(0)}%)</td><td></td><td></td><td class="text-right">${fmt(d.wasteAmt)}</td></tr>
  <tr><td>Materials w/ Waste</td><td></td><td></td><td class="text-right">${fmt(d.matWaste)}</td></tr>
  <tr><td>Labor (${(d.laborPct*100).toFixed(0)}%)</td><td></td><td></td><td class="text-right">${fmt(d.laborAmt)}</td></tr>
  <tr><td>GC Overhead (${(d.gcPct*100).toFixed(0)}%)</td><td></td><td></td><td class="text-right">${fmt(d.gcAmt)}</td></tr>
  </tbody></table></div>`;

  const costSF=d.grandTotal/d.floorSF;
  html+=`<div class="grand-total"><div><div class="total-label">Grand Total</div><div class="cost-sqft">${fmt(costSF)} per sq ft</div></div><div class="total-amount">${fmt(d.grandTotal)}</div></div>`;
  html+=`<div style="text-align:center;margin-top:24px;padding:16px;border-top:1px solid #eee;font-size:.88rem;color:#888">Ebbers Construction · SE Nebraska · 402-580-5977<br>Estimate generated ${new Date().toLocaleDateString()} — Prices subject to change</div>`;
  el('estimateOutput').innerHTML=html;
}

// ═══════════════════════════════════════
// RUNNING TOTAL with animated cost changes
// ═══════════════════════════════════════
let lastTotal = 0;
let countUpRAF = null;
let currentDisplayTotal = 0;

function updateRunningTotal() {
  try {
    const d = computeEstimateData();
    const newTotal = d.grandTotal;
    const diff = newTotal - lastTotal;
    
    if (Math.abs(diff) > 0.50 && lastTotal > 0) {
      showCostFloat(diff);
    }
    
    // Count up/down animation
    animateCountTo(newTotal);
    
    lastTotal = newTotal;
  } catch(e) {}
}

function animateCountTo(target) {
  const numEl = el('runningTotal');
  if (!numEl) return;
  
  const start = currentDisplayTotal;
  const diff = target - start;
  if (Math.abs(diff) < 0.01) { numEl.textContent = fmt(target); currentDisplayTotal = target; return; }
  
  const duration = 500;
  const startTime = performance.now();
  
  // Bump effect
  numEl.classList.add('bump');
  setTimeout(() => numEl.classList.remove('bump'), 180);
  
  if (countUpRAF) cancelAnimationFrame(countUpRAF);
  
  function tick(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    // Ease out cubic
    const eased = 1 - Math.pow(1 - progress, 3);
    const current = start + diff * eased;
    currentDisplayTotal = current;
    numEl.textContent = fmt(current);
    if (progress < 1) {
      countUpRAF = requestAnimationFrame(tick);
    } else {
      currentDisplayTotal = target;
      numEl.textContent = fmt(target);
    }
  }
  countUpRAF = requestAnimationFrame(tick);
}

function showCostFloat(diff) {
  const container = el('headerTotal');
  if (!container) return;
  
  const floater = document.createElement('div');
  floater.className = 'cost-float ' + (diff >= 0 ? 'positive' : 'negative');
  floater.textContent = (diff >= 0 ? '+' : '−') + ' $' + Math.abs(diff).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  
  container.appendChild(floater);
  
  // Trigger animation on next frame
  requestAnimationFrame(() => {
    floater.classList.add('animate');
  });
  
  // Clean up after animation
  setTimeout(() => {
    if (floater.parentNode) floater.parentNode.removeChild(floater);
  }, 1000);
}

// Hook into all input changes to update running total
document.addEventListener('DOMContentLoaded', () => {
  // Initial calc after a short delay to let panels render
  setTimeout(() => {
    updateRunningTotal();
  }, 300);
  
  // Watch for all changes
  document.addEventListener('change', () => {
    setTimeout(updateRunningTotal, 50);
  });
  document.addEventListener('click', (e) => {
    if (e.target.classList.contains('btn-remove') || e.target.classList.contains('btn-add') || 
        e.target.closest('.preview-card') || e.target.closest('.toggle-switch')) {
      setTimeout(updateRunningTotal, 100);
    }
  });
});
